spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    # Ahora usamos el puerto 5432 y la BD airline_db definida arriba
    url: jdbc:postgresql://localhost:5432/airline_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}


